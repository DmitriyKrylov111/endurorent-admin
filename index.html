<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EnduroRent Доставка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="manifest" href="data:application/json,{}">
    <meta name="theme-color" content="#0d6efd">
    <style>
        body { padding-bottom: 70px; background: #f8f9fa; }
        .delivery-card { border-radius: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container py-3" id="app" style="display:none;">
    <!-- Экран входа (показывается, если нет сохранённых учётных данных) -->
    <div id="login-screen" style="display:none;">
        <h3 class="text-center mb-3"><i class="bi bi-truck"></i> Вход для персонала</h3>
        <div id="login-error" class="alert alert-danger" style="display:none;"></div>
        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">Логин</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
    </div>

    <!-- Основной экран (после успешной проверки) -->
    <div id="main-screen" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="bi bi-truck"></i> Доставки</h4>
            <div>
                <button class="btn btn-outline-secondary btn-sm" onclick="changeRole()">
                    <i class="bi bi-arrow-repeat"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Выйти</button>
            </div>
        </div>
        <div id="delivery-list"></div>
    </div>

    <!-- Модальное окно выбора роли -->
    <div class="modal fade" id="roleModal" data-bs-backdrop="static" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Выберите роль</h5></div>
          <div class="modal-body d-grid gap-3">
            <button class="btn btn-outline-primary btn-lg" onclick="setRole('courier')">
                <i class="bi bi-bicycle"></i> Курьер
            </button>
            <button class="btn btn-outline-success btn-lg" onclick="setRole('warehouse')">
                <i class="bi bi-box-seam"></i> Работник склада
            </button>
          </div>
        </div>
      </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ---------- Конфигурация ----------
    const SERVER_URL = 'http://178.70.89.124:5000';   // <-- укажите актуальный IP вашего сервера
    const statusConfig = {
        courier: {
            label: 'Курьер',
            available: ['loaded', 'in_transit', 'delivered'],
            labels: {'loaded':'Загружен в машину', 'in_transit':'В пути', 'delivered':'Доставлен'}
        },
        warehouse: {
            label: 'Работник склада',
            available: ['created', 'shipped', 'courier'],
            labels: {'created':'Заказ создан', 'shipped':'Отгружен со склада', 'courier':'Передан курьеру'}
        }
    };

    let currentRole = localStorage.getItem('deliveryRole') || null;
    const roleModal = new bootstrap.Modal(document.getElementById('roleModal'));
    let authHeader = null;   // 'Basic ...'

    // ---------- Вспомогательные функции ----------
    function getAuthHeader() {
        const creds = localStorage.getItem('creds');  // храним в формате 'username:password'
        if (creds) {
            return 'Basic ' + btoa(creds);
        }
        return null;
    }

    function saveCredentials(username, password) {
        localStorage.setItem('creds', `${username}:${password}`);
        authHeader = 'Basic ' + btoa(`${username}:${password}`);
    }

    function clearCredentials() {
        localStorage.removeItem('creds');
        authHeader = null;
    }

    async function apiFetch(url, options = {}) {
        const headers = options.headers || {};
        if (authHeader) {
            headers['Authorization'] = authHeader;
        }
        const resp = await fetch(`${SERVER_URL}${url}`, { ...options, headers });
        if (resp.status === 401) {
            // сохранённые учётные данные устарели или неверны
            clearCredentials();
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-screen').style.display = 'none';
            return { error: 'Unauthorized' };
        }
        return resp;
    }

    function showMain() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        if (currentRole) {
            loadDeliveries();
        } else {
            roleModal.show();
        }
    }

    function logout() {
        clearCredentials();
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('main-screen').style.display = 'none';
    }

    function setRole(role) {
        currentRole = role;
        localStorage.setItem('deliveryRole', role);
        roleModal.hide();
        loadDeliveries();
    }

    function changeRole() {
        localStorage.removeItem('deliveryRole');
        currentRole = null;
        roleModal.show();
        document.getElementById('delivery-list').innerHTML = '';
    }

    async function loadDeliveries() {
        const resp = await apiFetch('/api/admin/deliveries');
        if (resp.error) return;
        const data = await resp.json();
        const list = document.getElementById('delivery-list');
        const config = statusConfig[currentRole];
        list.innerHTML = '';
        data.forEach(b => {
            const card = document.createElement('div');
            card.className = 'card delivery-card shadow-sm';
            card.innerHTML = `
                <div class="card-body">
                    <h5>#${b.id} – ${b.bike}</h5>
                    <p><small>${b.address}, ${b.phone}</small></p>
                    <p>${b.date} ${b.time}</p>
                    <select class="form-select" data-id="${b.id}">
                        ${config.available.map(s => `<option value="${s}" ${b.delivery_status === s ? 'selected' : ''}>${config.labels[s]}</option>`).join('')}
                    </select>
                </div>
            `;
            card.querySelector('select').addEventListener('change', async (e) => {
                const newStatus = e.target.value;
                const formData = new FormData();
                formData.append('delivery_status', newStatus);
                await apiFetch(`/api/booking/update_delivery/${b.id}`, {
                    method: 'POST',
                    body: formData
                });
            });
            list.appendChild(card);
        });
    }

    // ---------- Обработка входа ----------
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        if (!username || !password) return;

        // Пробуем авторизоваться
        const testAuth = 'Basic ' + btoa(`${username}:${password}`);
        try {
            const resp = await fetch(`${SERVER_URL}/api/admin/auth-test`, {
                headers: { 'Authorization': testAuth }
            });
            if (resp.ok) {
                saveCredentials(username, password);
                showMain();
            } else {
                document.getElementById('login-error').textContent = 'Неверный логин или пароль';
                document.getElementById('login-error').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('login-error').textContent = 'Ошибка соединения с сервером';
            document.getElementById('login-error').style.display = 'block';
        }
    });

    // ---------- Инициализация ----------
    document.getElementById('app').style.display = 'block';
    authHeader = getAuthHeader();
    if (authHeader) {
        // Проверяем сохранённую сессию
        fetch(`${SERVER_URL}/api/admin/auth-test`, { headers: { 'Authorization': authHeader } })
            .then(resp => {
                if (resp.ok) {
                    showMain();
                } else {
                    document.getElementById('login-screen').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('login-screen').style.display = 'block';
            });
    } else {
        document.getElementById('login-screen').style.display = 'block';
    }

    // Регистрируем Service Worker для офлайн-доступа (не обязательно, но для PVA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
</script>
</body>
</html>
